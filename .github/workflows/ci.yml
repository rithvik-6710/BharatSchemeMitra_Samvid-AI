name: Bharat Scheme Mitra CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-tests:
    name: Backend Syntax (Python 3.11)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Check Python syntax
        run: |
          cd backend
          python -m py_compile app.py
          python -m py_compile conversation_engine.py
          python -m py_compile user_profile_service.py
          python -m py_compile aws_services_integration.py
          echo "All Python files have valid syntax"

  frontend-build:
    name: Frontend Build (Node 18)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Build frontend
        run: |
          cd frontend
          npm run build

  indictrans2-syntax:
    name: IndicTrans2 Server Syntax
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Check IndicTrans2 syntax
        run: |
          cd backend
          python -m py_compile indictrans2_server.py

  deploy-to-aws:
    name: Deploy to AWS (ap-south-1)
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build, indictrans2-syntax]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Skip deploy for now
        run: echo "AWS deploy will be configured later"